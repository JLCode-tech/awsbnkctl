name: CI

# Runs on every PR and on push to main. Catches the SDK-method-name and
# version-pin guesses captured in docs/SHAKEOUT.md without needing
# anyone to drive a local build.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: vet + fmt + staticcheck + test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Track go.mod's `go` directive — testcontainers-go's
          # transitive otel deps require Go 1.25+, and pinning here
          # would diverge silently from go.mod. setup-go reads the
          # directive and downloads a matching toolchain.
          go-version-file: go.mod
          cache: true

      - name: Resolve modules
        run: |
          go mod download
          go mod verify

      - name: go vet
        run: go vet ./...

      - name: gofmt
        # Fail if any file is not gofmt-clean. `tee` keeps the diff in the
        # log so reviewers can see exactly what's wrong.
        run: gofmt -d -l . | tee /tmp/gofmt.diff && test ! -s /tmp/gofmt.diff

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: 'latest'
          install-go: false

      - name: go test
        # -race catches data races; cheap to run on the small unit suite
        # we have today. Sprint 2 added `internal/k8s/*_test.go` —
        # they're picked up here automatically once the integrator drops
        # the `k8sinternal` build tag (carried temporarily during staff
        # +validator parallel work). See `internal/k8s/get_test.go`
        # header for the rationale and removal plan.
        run: go test -race ./...

      - name: go build
        # Build everything (cmd/ + internal/) to catch any unused-import
        # or undefined-symbol issues that vet/test missed.
        run: go build ./...

  integration:
    name: integration (testcontainers — sshd)
    needs: test
    # Linux only: testcontainers-go on macOS GitHub runners requires Docker
    # Desktop, which isn't installed on the hosted images. Windows runners
    # have similar Docker-availability gaps. Linux runners ship Docker by
    # default, so we get a free integration tier on every push to main and
    # on same-repo PRs.
    #
    # Skipped on PRs from forks: the `head.repo.full_name == repository`
    # check below excludes those. Forks would otherwise hit Docker rate
    # limits without the right secrets and produce noisy red-x checks for
    # contributions that don't even touch internal/remote.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      # Disable the testcontainers-go `testcontainers/ryuk` reaper. On
      # ephemeral GitHub-hosted runners the runner VM is discarded after
      # the job, so leaked containers can't survive — the reaper's only
      # job is to clean up against long-lived hosts. Disabling it kills
      # the docker-hub `testcontainers/ryuk:<v>` image pull that produced
      # the intermittent `429 too many requests` flake on
      # `TestIntegration_Connect_Whoami` during the v1.1.x cycle.
      # PLAN.md §"Sprint 9" code deliverable 4.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Track go.mod's `go` directive rather than hard-coding here —
          # the testcontainers-go dependency chain (docker → otel) pulls
          # in a recent toolchain requirement; pinning a stale version
          # in this YAML would diverge silently.
          go-version-file: go.mod
          cache: true

      - name: go test (integration tag)
        # 5m wall budget covers image pull (~30s on a cold runner) +
        # six test cases × ~20s each. Bumps if we add tests; reduce
        # only after measuring.
        run: go test -tags integration -timeout 5m ./internal/remote/...

  docker-backend:
    name: integration (docker backend)
    needs: test
    # Linux-only mirror of the existing integration job, scoped to the
    # docker backend tests under `internal/exec/`. Sprint 3 / PRD 03
    # introduces `internal/exec/docker_integration_test.go` which spins
    # short-lived busybox containers via the docker backend and asserts
    # the cred-no-leak invariant from PRD 04. Skipped on PRs from forks
    # for the same reasons as the `integration` job above.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Pre-pull test images
        # The integration tests use busybox:1.36 (bind-mount round-trip
        # probe) — pre-pull on the host docker daemon so the first run
        # inside Go's 90s context budget doesn't time out on a cold
        # Docker Hub pull.
        run: docker pull busybox:1.36

      - name: go test (integration tag — exec/docker)
        # The tests inside this package self-skip when `docker info`
        # fails, so the job is safe even on a runner without a daemon.
        # 5m matches the existing integration job's budget.
        run: go test -tags integration -timeout 5m ./internal/exec/...

  aws-mocked:
    name: integration (aws — mocked sdk)
    needs: test
    # Sprint 1 (PRD 07): exercises `internal/aws/{client,sts,ec2,eks,vpc}.go`
    # against mocked aws-sdk-go-v2 clients. Sprint 2 (PRD 08) extends
    # the same job to cover `internal/aws/{s3,iam}.go` — the S3 supply
    # chain helpers (`PutObject`, `HeadObject`) and the IRSA / OIDC
    # readers (`GetOIDCProvider`, `HasIRSARole`) — using the same
    # aws-sdk-go-v2 middleware-test pattern. NO LIVE AWS — the staff
    # agent injects fake API responders via the middleware seam (or
    # hand-rolled interfaces in test files). This job runs on every PR
    # and push because it doesn't need credentials, network egress to
    # AWS, or a runtime daemon; the only requirement is the Go toolchain.
    #
    # Live-AWS validation is the operator-run spike (PRD 07 §"Spike
    # protocol"), gating v0.2 outside the agent dispatch lane.
    #
    # If a future test calls `sts.GetCallerIdentity` / `s3.PutObject` /
    # `iam.GetOpenIDConnectProvider` (or any other AWS API) without a
    # mock, this job will time out hitting the real AWS endpoint with
    # no creds. The validator's task brief calls for an issue against
    # the staff agent in that scenario rather than a silent fix here.
    #
    # Sprint 2 deferral (validator Issue 2): a localstack-backed
    # integration tier (`services: localstack:` step) is the v1.x
    # follow-up — gives the S3 + IAM helpers a real HTTP endpoint to
    # round-trip against without needing a real AWS account. For v1.0
    # the mocked-only path keeps the CI surface free of Docker-in-CI
    # cost + flake, and the PRD 08 helpers are simple enough that
    # mocked unit tests catch the regression shape.
    runs-on: ubuntu-latest
    env:
      # Belt-and-braces: if a test path leaks past its mock, these
      # fake creds let the SDK construct a Signer without panicking on
      # an empty default-chain resolve, while still failing closed at
      # the network layer (the fake key would 403 a real AWS endpoint).
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_SESSION_TOKEN: testing
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go test (integration tag — internal/aws)
        # 3m budget covers the mocked-SDK suite — no image pulls, no
        # network. Sprint 2 (PRD 08) adds `internal/aws/{s3,iam}_test.go`
        # to the same package, so the wildcard `./internal/aws/...`
        # already picks them up — no per-file invocation needed.
        # Bumps if the suite grows; reduce only after measuring.
        run: go test -tags integration -timeout 3m ./internal/aws/...

  k8s-backend:
    name: integration (k8s backend — kind)
    needs: test
    # Linux-only kind-based integration job for the K8s backend (Sprint 4
    # / PRD 03 second half). Uses helm/kind-action to spin an ephemeral
    # kind cluster, then runs the integration-tagged tests under
    # internal/exec and internal/cli (the latter exercises `awsbnkctl
    # ops install/show/uninstall` end-to-end).
    #
    # Skipped on PRs from forks for the same reasons as the `integration`
    # job above — kind images pulled from upstream registries hit rate
    # limits without GHCR credentials.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: helm/kind-action@v1
        with:
          wait: 120s
          version: v0.24.0

      - name: Pre-load test images into kind
        # Pull busybox:1.36 on the host docker daemon, then `kind load`
        # it into the kind node so kubelet doesn't have to pull from
        # Docker Hub (rate-limited on cold runners, often times out
        # against the 3m k8sJobReadyTimeout in internal/exec/k8s.go).
        # The same pull also serves the docker-backend integration
        # test that runs alongside in this job (busybox bind-mount
        # round-trip).
        run: |
          docker pull busybox:1.36
          kind load docker-image busybox:1.36 --name chart-testing

      - name: go test (integration tag — exec/k8s + cli/ops)
        # Tests self-skip when no kubeconfig is reachable, so a kind
        # bring-up failure surfaces as a yellow-skip rather than a red
        # fail (still investigable from the kind-action logs above).
        # 10m budget covers image pulls + ops-pod scheduling + the
        # full ops install/show/uninstall lifecycle.
        run: go test -tags integration -timeout 10m ./internal/exec/... ./internal/cli/...

  full-up-dryrun:
    name: full-up-dryrun (awsbnkctl up --dry-run)
    needs: test
    # Sprint 3 (PLAN.md § "Sprint 3"): the first end-to-end gate that
    # asserts `awsbnkctl up --dry-run` plans the full module graph —
    # eks_cluster → cert_manager → s3_supply_chain + iam_irsa →
    # flo → cne_instance → license → testing — without panicking. No
    # live AWS: fake creds + AWS_EC2_METADATA_DISABLED match the
    # `aws-mocked` job. terraform plan reaches the AWS endpoints only
    # for data sources the modules read; with fake creds those calls
    # 403 and Terraform surfaces them as plan-time diagnostics, which
    # is what we want — the assertion is "the orchestrator dispatched
    # plan against every module", not "AWS accepted the plan".
    #
    # SPIKE DEFERRAL still in force (PRD 07 §"Spike protocol"): live
    # `terraform apply` lands the v0.2 tag, gated outside this lane.
    # This job exercises the plan path only.
    #
    # If staff has not yet wired the top-level `--dry-run` flag on the
    # `up` command at the time this job first runs, it will fail with
    # `unknown flag: --dry-run` — that is the intended canary. The
    # job exists as a sprint-close regression gate; once staff's
    # `lifecycle.go runUp` plumbs --dry-run through to the root
    # terraform module, this job goes green.
    runs-on: ubuntu-latest
    env:
      # Mirror of aws-mocked job: fake creds let the SDK signer
      # construct without panicking on an empty default chain. The
      # AWS calls Terraform makes (e.g. data.aws_caller_identity) will
      # 403, but the plan still emits a graph that names every module
      # — which is what the grep assertion checks.
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_SESSION_TOKEN: testing
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: hashicorp/setup-terraform@v3
        with:
          # Pin to a stable 1.x line; the modules require >= 1.0
          # per terraform/main.tf. Newer minor versions are fine.
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Build awsbnkctl
        # Emit the binary at bin/awsbnkctl to match the path the brief
        # exercises (./bin/awsbnkctl). Same layout the integrator's
        # tag-time goreleaser job uses.
        run: |
          mkdir -p bin
          go build -o bin/awsbnkctl ./cmd/awsbnkctl

      - name: Run up --dry-run and capture plan output
        # Use a fresh HOME so the workspace config-yaml path is
        # isolated from any state the test runner inherited. Tee to
        # both stdout (so the Actions log shows it) and a file (so
        # the next step can grep it).
        run: |
          set -eo pipefail
          export HOME="$RUNNER_TEMP/home"
          mkdir -p "$HOME"
          mkdir -p artifacts
          ./bin/awsbnkctl up --dry-run \
            2>&1 | tee artifacts/up-dryrun.log

      - name: Assert plan output mentions all 7 modules
        # Module list per Sprint 3 brief: eks_cluster, cert_manager,
        # s3_supply_chain, iam_irsa, flo, cne_instance, license,
        # testing. (Brief writes "7 modules" but lists 8 names; we
        # assert every name in the list — see
        # issues/issue_sprint3_validator.md Issue 1 for the audit
        # trail.) Each match is a separate grep so a missing module
        # surfaces by name in the failed-step output, not as a single
        # opaque "no match" line.
        run: |
          set -eo pipefail
          log=artifacts/up-dryrun.log
          fail=0
          for mod in \
            eks_cluster \
            cert_manager \
            s3_supply_chain \
            iam_irsa \
            flo \
            cne_instance \
            license \
            testing
          do
            if ! grep -qE "(module\.${mod}\b|\"${mod}\")" "$log"; then
              echo "::error::module not found in plan output: ${mod}"
              fail=1
            else
              echo "  ✓ ${mod}"
            fi
          done
          exit "$fail"

      - name: Upload plan output
        # Always upload — green or red — so debug context survives.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: up-dryrun-log
          path: artifacts/up-dryrun.log
          if-no-files-found: warn

  windows-build:
    name: windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go build ./...

  goreleaser-check:
    name: goreleaser config sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # `check` validates .goreleaser.yml without producing artefacts.
          # Catches typos and template breaks before tag time.
          args: check

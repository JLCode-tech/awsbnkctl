name: Validate book

# Validation-only workflow. Runs `mdbook test` (rust doctest) and
# `mdbook build` on every push and PR that touches the book — catches
# broken markdown, dead links, malformed code fences.
#
# Publishing (HTML → gh-pages, PDF → GitHub Release asset) is driven
# locally by `make release` + `make release-publish` on the integrator's
# machine. That keeps the multi-GB pandoc + XeLaTeX + mermaid-cli
# toolchain off the runner — it lives in the tools/docker/mdbook image
# the integrator already has built locally.
#
# The pandoc backend is marked `optional = true` in book/book.toml so
# host-install mdbook (no pandoc) skips PDF rendering with a warning
# instead of failing the build.

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'
  pull_request:
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Install mdbook-mermaid
        # mdbook-mermaid is a separate preprocessor binary; peaceiris/actions-mdbook
        # only ships mdbook itself. Cached across runs.
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook-mermaid

      - name: Test (link check + code-block validation)
        run: mdbook test book/

      - name: Build HTML (catches malformed markdown)
        # Pandoc backend is `optional = true` in book.toml, so this
        # builds HTML cleanly without needing pandoc/XeLaTeX on the runner.
        run: mdbook build book/

name: Build and deploy book

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'
  pull_request:
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'

jobs:
  validate:
    # Build + link-check on every PR; doesn't deploy.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - name: Install mdbook-mermaid
        # The Sprint 7 polish pass added Mermaid diagrams to chapters 7 / 17 / 21.
        # mdbook-mermaid is a separate preprocessor binary; peaceiris/actions-mdbook
        # only ships mdbook itself. We cache the cargo install across runs so the
        # first PR per cache eviction pays the ~3-min build, subsequent runs are
        # instant.
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook-mermaid
      - name: Test (link check + code-block validation)
        run: mdbook test book/
      - name: Build (catches malformed markdown)
        run: mdbook build book/

  build-deploy:
    # Deploy on push to main only.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Install mdbook-mermaid
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook-mermaid

      - name: Build book
        run: mdbook build book/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # mdbook namespaces output per backend once book.toml has more
          # than one [output.*] block (HTML at book/html/, pandoc PDF at
          # book/pandoc/<profile>/). Publish only the HTML subtree.
          publish_dir: ./book/book/html
          publish_branch: gh-pages
          # Publish under /book/ on gh-pages so the served URL matches
          # the README link: https://jgruberf5.github.io/roksbnkctl/book/
          destination_dir: book

name: Full E2E

# Manual-trigger workflow for the combined A-H + I-N + L-DNS e2e
# driver.
#
# Sprint 0 retarget: the inherited driver was IBM-Cloud-shaped. Per
# docs/PLAN.md Sprint 0 ("identity rewrite + IBM strip + AWS stub"),
# every e2e phase is currently a skip-stub citing the sprint that
# retargets it (cluster-bring-up → Sprint 3; backend matrix → Sprint 4;
# L-DNS → Sprint 4; v1.0 sign-off run → Sprint 6). This workflow stays
# wired so the trigger surface (workflow_dispatch + release/** push)
# survives, but it just echoes the skip-banner and exits 0 instead of
# running the IBM-shaped driver against an AWS account it cannot reach.
#
# Sprint 4 will replace this stub with the AWS-flavoured full-e2e driver
# (workflow inputs renamed: cluster_region → aws_region; secret renamed:
# IBMCLOUD_API_KEY → AWS_*). Sprint 6 cuts v1.0 gated on this workflow
# going green.
#
# Triggers:
#   - workflow_dispatch — manual run from the Actions tab.
#   - push to release/** — the release-branch gate (no-op until Sprint 4).
#
# NOT triggered on PR / push to main / push to feature branches — the
# fast unit + integration tiers in ci.yml cover those.

on:
  workflow_dispatch:
    inputs:
      cluster_region:
        # Renamed to aws_region in Sprint 4 once the AWS-shaped driver
        # lands. Left as cluster_region in Sprint 0 to preserve the
        # input contract until the driver actually consumes it.
        description: 'AWS region for the test cluster (us-east-1, us-west-2, eu-west-1, ...)'
        required: true
        default: 'us-east-1'
      teardown_on_success:
        description: 'Tear down the cluster after a green run (false leaves it up for inspection)'
        required: false
        default: 'true'
        type: boolean
  push:
    branches:
      - 'release/**'

permissions:
  contents: read

jobs:
  full-e2e:
    name: Full E2E (Sprint 0 stub — skipped pending AWS retarget)
    runs-on: ubuntu-latest
    # Gate to this fork so cross-repo PRs don't try to run it.
    if: github.repository == 'JLCode-tech/awsbnkctl'
    steps:
      - uses: actions/checkout@v4

      - name: Sprint 0 skip banner
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "Full E2E — Sprint 0 stub"
          echo "════════════════════════════════════════════════════════════"
          echo "All e2e phases are skip-marked pending AWS retarget."
          echo "  Phases A-H (cluster bring-up):    Sprint 3"
          echo "  Phases I-N (backend matrix):      Sprint 4"
          echo "  Phase L-DNS:                      Sprint 4"
          echo "  Full v1.0 sign-off:               Sprint 6"
          echo "See docs/PLAN.md for the retarget plan."
          exit 0

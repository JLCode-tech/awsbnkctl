name: Full E2E

# Manual-trigger workflow for the combined A-H + I-N + L-DNS e2e
# driver.
#
# Sprint 4 status: the backend-matrix phases (I-N + L-DNS) join the
# cluster-bring-up phases (A-H) at the dry-run tier. The combined
# dry-run regression surface now lives across two CI jobs in
# .github/workflows/ci.yml:
#
#   - `full-up-dryrun` (Sprint 3) — exercises `awsbnkctl up --dry-run`
#     against the eight-module root graph.
#   - `test-dryrun` (Sprint 4) — exercises `awsbnkctl test
#     {connectivity,dns,throughput} --dry-run` against a fake
#     workspace materialised in the runner's HOME.
#
# Both jobs run on every PR. The **live-apply** tier of every phase
# (cluster bring-up + backend matrix + DNS probe + throughput) still
# gates on the operator-run PRD 07 spike (docs/prd/07-EKS-CLUSTER-
# SRIOV.md § "Spike protocol"), so this workflow stays a skip-stub
# for live-AWS runs. The trigger surface (workflow_dispatch +
# release/** push) survives so downstream automation (release
# branches, the integrator's babysit loop) keeps parsing it; the
# body echoes the updated Sprint 4 skip-banner and exits 0.
#
# Sprint 6 cuts v1.0 gated on the operator-run spike — at which point
# this workflow transitions from skip-stub to actual e2e driver
# invocation (renaming `cluster_region` → `aws_region` and threading
# AWS_* secrets instead of IBMCLOUD_API_KEY; tracked as Sprint 3
# validator Issue 7).
#
# Triggers:
#   - workflow_dispatch — manual run from the Actions tab.
#   - push to release/** — the release-branch gate (no-op until Sprint 6).
#
# NOT triggered on PR / push to main / push to feature branches — the
# fast unit + integration tiers in ci.yml cover those. The Sprint 3
# `full-up-dryrun` + Sprint 4 `test-dryrun` jobs in ci.yml run on every
# PR and provide the dry-run regression gates that this workflow's
# live-apply path will eventually wrap.

on:
  workflow_dispatch:
    inputs:
      cluster_region:
        # Renamed to aws_region in Sprint 4 once the AWS-shaped driver
        # lands. Left as cluster_region in Sprint 0 to preserve the
        # input contract until the driver actually consumes it.
        description: 'AWS region for the test cluster (us-east-1, us-west-2, eu-west-1, ...)'
        required: true
        default: 'us-east-1'
      teardown_on_success:
        description: 'Tear down the cluster after a green run (false leaves it up for inspection)'
        required: false
        default: 'true'
        type: boolean
  push:
    branches:
      - 'release/**'

permissions:
  contents: read

jobs:
  full-e2e:
    name: Full E2E (Sprint 4 stub — live apply gates on PRD 07 spike)
    runs-on: ubuntu-latest
    # Gate to this fork so cross-repo PRs don't try to run it. Sprint
    # 4 brief: trigger surface still gated to JLCode-tech/awsbnkctl;
    # body now references both the Sprint 3 full-up-dryrun and the
    # Sprint 4 test-dryrun CI jobs for the dry-run regression
    # surface, and the PRD 07 spike for the live-apply gate.
    if: github.repository == 'JLCode-tech/awsbnkctl'
    steps:
      - uses: actions/checkout@v4

      - name: Sprint 4 skip banner
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "Full E2E — Sprint 4 stub"
          echo "════════════════════════════════════════════════════════════"
          echo "Dry-run tier of phases A-H + I-N + L-DNS is exercised by"
          echo "  two CI jobs in .github/workflows/ci.yml (every PR):"
          echo "    full-up-dryrun (Sprint 3) — awsbnkctl up --dry-run"
          echo "    test-dryrun    (Sprint 4) — awsbnkctl test {conn,dns,thpt} --dry-run"
          echo ""
          echo "Live-apply tier still gates on the operator-run PRD 07 spike:"
          echo "  docs/prd/07-EKS-CLUSTER-SRIOV.md § \"Spike protocol\""
          echo "  (provision EKS 1.30 + self-managed c5n.4xlarge node group;"
          echo "   install Multus + SR-IOV CNI + device plugin DaemonSets;"
          echo "   schedule a pod requesting intel.com/sriov:1)."
          echo ""
          echo "Per-phase status:"
          echo "  Phases A-H (cluster bring-up):       Sprint 3 dry-run + PRD 07 spike for apply"
          echo "  Phases I-J (local/docker backends):  Sprint 4 dry-run + PRD 07 spike for apply"
          echo "  Phases K-L (multi-tool + k8s):       Sprint 4 dry-run + PRD 07 spike for apply"
          echo "  Phase  L-DNS (Route 53 GSLB probe):  Sprint 4 dry-run + PRD 07 spike for apply"
          echo "  Phase  M (cred-leak audit):          Sprint 4 implements; live exercise in spike"
          echo "  Phase  N (mixed-mode lifecycle):     Sprint 4 implements; live exercise in spike"
          echo "  Full v1.0 sign-off:                  Sprint 6 (gated on spike)"
          echo "See docs/PLAN.md § Sprint 4 for the retarget plan."
          exit 0

name: Build tools images

# Builds and publishes the per-tool docker images that PRD 03's docker
# backend pulls at runtime:
#
#   - ghcr.io/jgruberf5/roksbnkctl-tools-ibmcloud
#   - ghcr.io/jgruberf5/roksbnkctl-tools-iperf3
#
# Triggered on tag pushes (e.g. v0.9-rc1) and on manual dispatch — never on
# every PR. Tags published: the exact ref name + `latest`.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [ibmcloud, iperf3]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: tools/docker/${{ matrix.image }}
          push: true
          tags: |
            ghcr.io/jgruberf5/roksbnkctl-tools-${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/jgruberf5/roksbnkctl-tools-${{ matrix.image }}:latest

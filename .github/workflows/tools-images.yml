name: Build tools images

# Builds and publishes the per-tool docker images that PRD 03's docker
# backend pulls at runtime. Sprint 0 retarget: the ibmcloud-flavoured
# tools image was deleted alongside `tools/docker/ibmcloud/` (staff
# Sprint 0 IBM-strip). Sprint 1 (this file's last edit) adds the
# AWS-flavoured replacement (`ghcr.io/JLCode-tech/awsbnkctl-tools-aws`)
# carrying awscli v2 + kubectl + helm + iperf3 + dig + jq + curl for
# the docker exec-backend's AWS code paths (Sprint 4 wire-up).
#
# Current matrix:
#   - ghcr.io/JLCode-tech/awsbnkctl-tools-aws     (Sprint 1 added)
#   - ghcr.io/JLCode-tech/awsbnkctl-tools-iperf3
#
# Triggered on tag pushes (e.g. v0.9-rc1), on push to `main` (publishes a
# `:dev` tag so `go install ./cmd/awsbnkctl@main` works on a fresh host
# without a local `tools/docker/Makefile build` step), and on manual
# dispatch — never on every PR.
#
# Sprint 4 staff Issue 2 + Sprint 5 validator scope (validator owns
# CI workflow files). Tag → `:<tagname>` + `:latest`. Main-push →
# `:dev`. Workflow dispatch → both `:dev` and the input ref name.

on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        # Sprint 0 strip: `ibmcloud` matrix entry removed (the underlying
        # `tools/docker/ibmcloud/Dockerfile` was deleted in the staff
        # agent's IBM strip). Sprint 1 adds back the AWS-flavoured
        # replacement (`tools/docker/aws/Dockerfile`) alongside the
        # cloud-agnostic iperf3 image.
        image: [aws, iperf3]
    steps:
      - uses: actions/checkout@v4

      # QEMU is required for emulated cross-arch builds on a single
      # runner. `tonistiigi/binfmt:latest` registers handlers for every
      # arch the buildkit daemon advertises; without it the linux/arm64
      # leg of the matrix below would fail with "exec format error" as
      # soon as the first `RUN` instruction tries to invoke an arm64
      # binary on an amd64 host kernel.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag-push: publish :<tagname> + :latest. The iperf3 Dockerfile
      # is self-contained (no repo-root build context required) — the
      # build-args below are harmlessly ignored.
      #
      # Sprint 2 (tech-writer Sprint 1 Issue 6): `platforms` now
      # advertises a multi-arch manifest list (linux/amd64 +
      # linux/arm64). The Dockerfile under tools/docker/aws/ branches
      # on $TARGETARCH to pick the right awscli/kubectl/helm download
      # URL per arch; both arches are pinned to their own sha256s. The
      # iperf3 Dockerfile uses apk packages that publish for both
      # arches in Alpine, so the same multi-arch flag works without
      # Dockerfile edits there.
      - name: Build and push (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./tools/docker/${{ matrix.image }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          provenance: false
          build-args: |
            AWSBNKCTL_VERSION=${{ github.ref_name }}
            AWSBNKCTL_COMMIT=${{ github.sha }}
          push: true
          tags: |
            ghcr.io/JLCode-tech/awsbnkctl-tools-${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/JLCode-tech/awsbnkctl-tools-${{ matrix.image }}:latest

      # Main-push: publish :dev. internal/exec/docker.go's toolImageTag()
      # falls back to ":dev" for binaries that report Version=="dev"
      # (i.e., a `go install ./cmd/awsbnkctl@main` build); having :dev
      # in GHCR closes the gap so the docker backend doesn't fail to
      # pull on a fresh dev box.
      - name: Build and push (main → :dev)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./tools/docker/${{ matrix.image }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          provenance: false
          build-args: |
            AWSBNKCTL_VERSION=dev
            AWSBNKCTL_COMMIT=${{ github.sha }}
          push: true
          tags: |
            ghcr.io/JLCode-tech/awsbnkctl-tools-${{ matrix.image }}:dev

      # workflow_dispatch: build + push both forms so a manual run from
      # any branch can publish a :dev tag for testing.
      - name: Build and push (workflow_dispatch → :dev)
        if: github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./tools/docker/${{ matrix.image }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          provenance: false
          build-args: |
            AWSBNKCTL_VERSION=dev
            AWSBNKCTL_COMMIT=${{ github.sha }}
          push: true
          tags: |
            ghcr.io/JLCode-tech/awsbnkctl-tools-${{ matrix.image }}:dev

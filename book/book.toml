[book]
title = "Deploying and Testing BIG-IP Next for Kubernetes with roksbnkctl"
authors = ["roksbnkctl maintainers"]
language = "en"
src = "src"

[output.html]
git-repository-url = "https://github.com/jgruberf5/roksbnkctl"
default-theme = "rust"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.search]
enable = true

[preprocessor.mermaid]
command = "mdbook-mermaid"

# ---------------------------------------------------------------------
# PDF output via mdbook-pandoc + pandoc + XeLaTeX.
#
# Active only when the build host has `mdbook-pandoc`, `pandoc`, and a
# LaTeX distribution with `xelatex` available. The
# tools/docker/mdbook/Dockerfile image bundles all three; the GitHub
# Pages CI workflow at .github/workflows/book.yml does NOT (HTML-only
# build there). For a full release-prep build (HTML + PDF together),
# run `make release` from the repo root — it routes through the docker
# image.
#
# `optional = true` makes mdbook warn-and-skip this backend on hosts
# where mdbook-pandoc isn't installed (CI runners, contributor laptops
# without LaTeX) instead of erroring. Without it, `mdbook build` returns
# exit 101 with "the command `mdbook-pandoc` wasn't found" and the
# entire build fails.
#
# The Lua filter pre-renders Mermaid code blocks to SVG via mermaid-cli
# so the PDF embeds real diagrams (rather than literal `sequenceDiagram
# ...` text). The filter path is the in-container location from
# tools/docker/mdbook/Dockerfile.
[output.pandoc]
optional = true

[output.pandoc.profile.pdf]
output-file = "book.pdf"
to = "pdf"
pdf-engine = "xelatex"
toc = true
number-sections = true
filters = ["/opt/render-mermaid.lua"]

[output.pandoc.profile.pdf.variables]
documentclass = "report"
papersize = "letter"
geometry = ["margin=1in"]
# Font picks chosen for broad Unicode coverage — the chapters use
# box-drawing characters in ASCII tree diagrams (── │ ┌ ┐ └ ┘ ├ ┤),
# checkmark/cross/warning glyphs in sample doctor output (✓ ✗ ⚠), and
# arrow / math glyphs in prose (→ ⇒ ↔ ≠ ≥ ≫ ≈). Latin Modern doesn't
# cover those code points; DejaVu and Noto both do.
#
# DejaVu Sans Mono is the classic technical-book monospace — wide
# Unicode + good readability at body-text size. DejaVu Serif / Sans
# cover the math + arrow glyphs in body prose.
mainfont = "DejaVu Serif"
sansfont = "DejaVu Sans"
monofont = "DejaVu Sans Mono"
colorlinks = true
linkcolor = "NavyBlue"
urlcolor = "NavyBlue"
toccolor = "NavyBlue"

# header-includes injects raw LaTeX into the document preamble. We use
# it to map rare Unicode glyphs to LaTeX commands so they render
# correctly even in font faces (e.g. DejaVu Sans Mono Oblique used for
# bash-comment lines like `# ✓ Created workspace`) that don't carry the
# Dingbats or Mathematical Operators ranges. Without these maps,
# XeLaTeX prints `[WARNING] Missing character` and leaves a blank.
header-includes = [
  "\\usepackage{pifont}",
  "\\usepackage{newunicodechar}",
  "\\newunicodechar{✓}{\\ding{52}}",
  "\\newunicodechar{✗}{\\ding{56}}",
  "\\newunicodechar{⚠}{\\textbf{!}}",
  "\\newunicodechar{≫}{\\ensuremath{\\gg}}",
  "\\newunicodechar{≪}{\\ensuremath{\\ll}}",
  "\\newunicodechar{⇒}{\\ensuremath{\\Rightarrow}}",
  "\\newunicodechar{↔}{\\ensuremath{\\leftrightarrow}}",
  "\\newunicodechar{≥}{\\ensuremath{\\geq}}",
  "\\newunicodechar{≤}{\\ensuremath{\\leq}}",
  "\\newunicodechar{≠}{\\ensuremath{\\neq}}",
  "\\newunicodechar{≈}{\\ensuremath{\\approx}}",
]

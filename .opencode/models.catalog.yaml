# ═══════════════════════════════════════════════════════════════

claude-opus-4-6:
  name: "Claude 4.6 Opus"
  tier: frontier
  context: 200000
  output: 32000
  strengths: "Deep reasoning, sustained focus, complex decomposition"
  notes: "Current default for lead/architect"
  status: available

claude-opus-4-5:
  name: "Claude 4.5 Opus"
  tier: frontier
  context: 200000
  output: 32000
  strengths: "Deep reasoning, previous gen"
  notes: "Superseded by 4.6 but still available"
  status: available

claude-sonnet-4-6:
  name: "Claude 4.6 Sonnet"
  tier: workhorse
  context: 200000
  output: 16000
  strengths: "Pattern recognition, steerability, code review"
  notes: "Newer Sonnet — evaluate for reviewer role"
  status: available

claude-sonnet-4-5:
  name: "Claude 4.5 Sonnet"
  tier: workhorse
  context: 200000
  output: 16000
  strengths: "Pattern recognition, steerability. GitHub chose for Copilot"
  notes: "Current default for reviewer"
  status: available

claude-haiku-4-5:
  name: "Claude 4.5 Haiku"
  tier: fast
  context: 200000
  output: 8192
  strengths: "4-5x faster than Sonnet, 90% quality"
  notes: "Previous default builder. Good for compaction summarization"
  status: available


# Model Catalog — Known models available via the configured LLM provider
#
# Reference only. Not read by scripts — purely for humans picking models.
# Update when models are added/removed from your provider.
#
# Verify current availability (Anthropic example):
#   curl -s -H "x-api-key: $LLM_API_KEY" \
#     -H "anthropic-version: 2023-06-01" \
#     https://api.anthropic.com/v1/models | python3 -m json.tool
#
# For other providers, model discovery is provider-specific — consult your
# provider's API documentation for the appropriate endpoint and auth headers.
#
# Last verified: 2026-03-26


# goreleaser config for awsbnkctl.
# Run with: goreleaser release --clean (after tagging a release)
# Cross-compile sweep: linux/darwin/windows × amd64/arm64.
#
# Sprint 7 v1.0 polish:
#  - release.header / .footer link the GitHub Release page at the book.
#  - PDF book artifact: attached via `release.extra_files` below. Built
#    locally via `make release` (which routes through the docker image
#    at tools/docker/mdbook/Dockerfile) before running goreleaser, so
#    the PDF exists at book/book/pandoc/pdf/book.pdf at goreleaser time.
#  - Cosign / sigstore signing: deferred to v1.x (no signing infra wired
#    in the release workflow yet; shipping a half-working signs: block
#    would just produce bad attestations).
#  - Homebrew tap: deferred to v1.x (no tap repo yet; the brews: block
#    is left commented out below as a marker for when a tap lands).
version: 2

project_name: awsbnkctl

before:
  hooks:
    - go mod tidy

builds:
  - id: awsbnkctl
    main: ./cmd/awsbnkctl
    binary: awsbnkctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/JLCode-tech/awsbnkctl/internal/cli.Version={{.Version}}
      - -X github.com/JLCode-tech/awsbnkctl/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/JLCode-tech/awsbnkctl/internal/cli.BuildDate={{.Date}}

archives:
  # The name_template here is load-bearing: `internal/cli/self.go`
  # rebuilds the same template to find the asset for the host's
  # OS/arch when `awsbnkctl self update` runs. Keep these aligned.
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # goreleaser v2 renamed `format` (singular) to `formats` (list).
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - MIGRATING.md

checksum:
  name_template: "checksums.txt"

snapshot:
  # goreleaser v2 renamed name_template → version_template here.
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  # The header / footer wrap goreleaser's auto-generated changelog body
  # on the GitHub Release page. Keeping it short — the canonical
  # documentation lives in the book, the per-version detail in
  # CHANGELOG.md.
  header: |
    ## awsbnkctl {{ .Tag }}

    Single-binary CLI for deploying F5 BIG-IP Next for Kubernetes on AWS EKS.

    Read the book: <https://JLCode-tech.github.io/awsbnkctl/book/> — _Deploying and Testing BIG-IP Next for Kubernetes with awsbnkctl_

    Migration guide: <https://github.com/JLCode-tech/awsbnkctl/blob/main/MIGRATING.md>
  footer: |
    ---
    See [`CHANGELOG.md`](https://github.com/JLCode-tech/awsbnkctl/blob/main/CHANGELOG.md) for the full per-version change log.

    Verify the downloaded archive against `checksums.txt`:
    ```
    sha256sum -c checksums.txt --ignore-missing
    ```

    The attached `awsbnkctl-book-{{ .Tag }}.pdf` is the same book published at <https://JLCode-tech.github.io/awsbnkctl/book/>, packaged for offline reading. Build it locally any time via `make release` from the source tree.

  # The PDF book artifact is NOT attached by goreleaser. The CI runner
  # for release.yml doesn't have pandoc/XeLaTeX/mermaid-cli installed
  # (deliberately — pulling the multi-GB tools/docker/mdbook image on
  # every tag-push is wasteful when the integrator already has it built
  # locally). Instead, after this workflow finishes, the integrator runs:
  #
  #   make release-publish VERSION=vX.Y.Z
  #
  # from their machine, which uploads ./book/book/pandoc/pdf/book.pdf to
  # this Release as awsbnkctl-book-vX.Y.Z.pdf via `gh release upload`.
  #
  # Earlier versions of this config had `extra_files` pointing at the PDF.
  # That turned out to fail-stop the release (not warn-and-continue as
  # the comment claimed); removed in v1.0.1's recovery cut.

# Homebrew tap — wire when an `homebrew-tap` repo exists under the org.
# Until then, leaving this block commented out so goreleaser doesn't
# half-publish a formula pointing at a nonexistent tap.
#
# brews:
#   - name: awsbnkctl
#     repository:
#       owner: JLCode-tech
#       name: homebrew-tap
#     homepage: "https://JLCode-tech.github.io/awsbnkctl/book/"
#     description: "Single-binary CLI for deploying F5 BIG-IP Next for Kubernetes on AWS EKS."
#     license: "MIT"
#     test: |
#       system "#{bin}/awsbnkctl", "version"

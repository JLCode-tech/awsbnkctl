# cluster.yaml — real-account tracer test in ap-southeast-2.
#
# Derived from /Users/j.lucia/Code/aws-gpu-setup/vars.syd-test-lab.env:
#   - region:   ap-southeast-2 (AWS_REGION)
#   - VPC CIDR: 10.0.0.0/16    (VPC_CIDR)
#   - AZs:      ap-southeast-2a / ap-southeast-2b (AZ / AZ_B)
#   - public:   10.0.1.0/24  in -2a (MGMT_CIDR — workers + jumphost go here in slice 3+)
#               10.0.2.0/24  in -2b (EKS_CP_B_CIDR — EKS control plane needs ≥2 AZs)
#   - private:  10.0.11.0/24 in -2a (currently unused by aws-gpu-setup; reserved
#                                     for BNK-side workers when slices 3/5 land)
#               10.0.12.0/24 in -2b (second-AZ private symmetry)
#
# Note on BNK-specific subnets (BNK_EXT 10.0.10.0/24, BNK_INT 10.0.20.0/24):
# aws-gpu-setup also creates dedicated TMM data-plane subnets. Those are
# pattern-specific (host-device vs sr-iov-tmm) and will be modelled in slice 5
# when the variant manifest layer lands. For the tracer slice (VPC + IGW + NAT
# + RTs only) the schema's public/private split is sufficient.
#
# Prerequisites before `up`:
#   export AWS_PROFILE=Users-292785712872
#   aws sso login --profile $AWS_PROFILE
#   aws sts get-caller-identity     # sanity check
#
# Usage:
#   awsbnkctl up   --config examples/syd-tracer/cluster.yaml --dry-run
#   awsbnkctl up   --config examples/syd-tracer/cluster.yaml
#   awsbnkctl down --config examples/syd-tracer/cluster.yaml --yes
#
# State written to: .awsbnkctl/syd-tracer/state.env

apiVersion: awsbnkctl/v1
kind: Cluster

metadata:
  # syd-tracer = "Sydney tracer-bullet". Distinct from aws-gpu-setup's
  # syd-test-lab so the two can coexist in the same AWS account without
  # tag-discovery collisions.
  name: syd-tracer
  region: ap-southeast-2
  labels:
    owner: jarrod
    purpose: tracer-bullet-slice-01
    sourced-from: aws-gpu-setup/vars.syd-test-lab.env

network:
  vpcCidr: 10.0.0.0/16

  azs:
    - ap-southeast-2a
    - ap-southeast-2b

  subnets:
    public:
      # Public subnets: map-public-ip-on-launch, route 0.0.0.0/0 → IGW.
      # 10.0.1.0/24 matches MGMT_CIDR in aws-gpu-setup (workers + jumphost AZ).
      - cidr: 10.0.1.0/24
        az: ap-southeast-2a
      # 10.0.2.0/24 matches EKS_CP_B_CIDR (second AZ for EKS control-plane HA).
      - cidr: 10.0.2.0/24
        az: ap-southeast-2b

    private:
      # Private subnets: no public IP, egress via NAT GW (cost-optimised: 1 NAT).
      # 10.0.11.0/24 / 10.0.12.0/24 are NEW CIDRs (aws-gpu-setup uses
      # 10.0.10.0/24 + 10.0.20.0/24 for TMM VLANs which are pattern-specific).
      - cidr: 10.0.11.0/24
        az: ap-southeast-2a
      - cidr: 10.0.12.0/24
        az: ap-southeast-2b

  # 1 NAT GW = cost-optimised (single point of egress in the first public subnet).
  # For HA multi-AZ, set to len(azs). Per-AZ NAT is a slice 2+ option.
  natGateways: 1

# tags merged into every AWS resource alongside the mandatory awsbnkctl:* keys.
tags:
  cost-center: RnD-AI
  env: lab

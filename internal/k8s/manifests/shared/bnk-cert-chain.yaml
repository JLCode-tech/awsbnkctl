# BNK cert chain — Go text/template (ported from aws-gpu-setup/manifests/bnk-cert-chain.yaml).
# Variables are substituted from cluster.metadata.name at Phase 12 render time.
#
# Chain:
#   1. SelfSigned ClusterIssuer  — signs the CA Certificate
#   2. CA Certificate            — the cluster-scoped CA cert
#   3. CA ClusterIssuer          — signs leaf certs for BNK workloads
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .SelfSignedIssuer }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .CACertName }}
  namespace: cert-manager
spec:
  isCA: true
  commonName: {{ .CACertName }}
  secretName: {{ .CASecretName }}
  issuerRef:
    name: {{ .SelfSignedIssuer }}
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .CAIssuer }}
spec:
  ca:
    secretName: {{ .CASecretName }}

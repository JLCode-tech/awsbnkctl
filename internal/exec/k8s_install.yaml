# awsbnkctl ops install manifests
#
# Embedded into the binary via Go's embed directive (k8s_install.go).
# `awsbnkctl ops install` applies these in order, performing template
# substitution for ${OPS_IRSA_ROLE_ARN} (the IRSA role ARN provisioned
# by terraform/modules/iam_irsa for the ops-pod ServiceAccount) and
# ${OPS_IMAGE} (the awsbnkctl tools image ref, resolved at install
# time from the binary's version).
#
# PRD 03 §"K8s" + PRD 04 §"In-cluster identity" jointly drive this
# layout. Two namespaces are created up front so the long-lived ops
# Pod (in awsbnkctl-ops) and the per-Job ephemeral pods (in
# awsbnkctl-test) both have a place to land without race-y
# namespace-creation logic during test runs.
#
# Document separator order matters — we apply documents one at a time
# and bail on first error, so namespaces must precede objects that live
# in them.
#
# IRSA shape: the ops pod's ServiceAccount carries the
# `eks.amazonaws.com/role-arn` annotation. The EKS-managed
# pod-identity webhook reads that annotation at pod-admission time and
# (a) mounts a projected SA token at
# `/var/run/secrets/eks.amazonaws.com/serviceaccount/token` and (b)
# injects `AWS_ROLE_ARN` + `AWS_WEB_IDENTITY_TOKEN_FILE` env vars into
# the container. aws-sdk-go-v2 inside the pod sees those env vars and
# assumes the role via `sts:AssumeRoleWithWebIdentity` automatically —
# no static key in any Secret. The pod-identity webhook is part of
# EKS, not awsbnkctl; the IAM role and the SA annotation value are
# created upstream by `terraform/modules/iam_irsa` (PRD 08).
---
apiVersion: v1
kind: Namespace
metadata:
  name: awsbnkctl-ops
  labels:
    awsbnkctl.io/managed: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: awsbnkctl-test
  labels:
    awsbnkctl.io/managed: "true"
    awsbnkctl.io/test: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: awsbnkctl-ops
  namespace: awsbnkctl-ops
  labels:
    awsbnkctl.io/managed: "true"
  annotations:
    # IRSA wiring — the EKS pod-identity webhook reads this annotation
    # and injects projected-SA-token + AWS_ROLE_ARN + AWS_WEB_IDENTITY_TOKEN_FILE
    # into the ops pod's container at admission time. The role ARN is
    # provisioned by `terraform/modules/iam_irsa/` (PRD 08) and resolved
    # by `awsbnkctl ops install` from terraform outputs before applying
    # this manifest.
    eks.amazonaws.com/role-arn: "${OPS_IRSA_ROLE_ARN}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: awsbnkctl-ops
  labels:
    awsbnkctl.io/managed: "true"
rules:
  # Job lifecycle in awsbnkctl-test (one-shot tool runs).
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete", "watch"]
  # Pods (read + exec + log) in both namespaces. Exec is required for the
  # long-lived ops-pod path; log is required for the Job path.
  #
  # We don't grant pods/exec cluster-wide — only the two namespaces we
  # manage. PRD 03 §"K8s" §"least privilege".
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  # Per-Job ephemeral Secret create/delete in awsbnkctl-test. The k8s
  # backend's runAsJob path materialises opts.Files into a per-Job
  # Secret mounted at /work; cleanup runs via Job ownerRef on success
  # and explicit Delete on context cancel. Scoped to the test namespace
  # only — no cluster-wide Secret read; AWS credentials reach pods via
  # IRSA. PRD 04 §"In-cluster identity".
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: awsbnkctl-ops
  labels:
    awsbnkctl.io/managed: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: awsbnkctl-ops
subjects:
  - kind: ServiceAccount
    name: awsbnkctl-ops
    namespace: awsbnkctl-ops
---
apiVersion: v1
kind: Pod
metadata:
  name: awsbnkctl-ops
  namespace: awsbnkctl-ops
  labels:
    app: awsbnkctl-ops
    awsbnkctl.io/managed: "true"
spec:
  serviceAccountName: awsbnkctl-ops
  restartPolicy: Always
  # EKS Pod Security Admission (restricted profile) compliance:
  # pod-level seccomp + runAsNonRoot, container-level
  # allowPrivilegeEscalation=false + cap drop. Same posture the
  # ephemeral test Job specs use (see internal/exec/k8s.go).
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: tools
      image: ${OPS_IMAGE}
      imagePullPolicy: IfNotPresent
      command: ["sleep", "infinity"]
      env:
        # The pod runs as a non-root UID per PSA restricted; that UID
        # may have no /etc/passwd entry, so tools that probe $HOME at
        # invocation time (aws, kubectl, helm) hit `/` (read-only fs
        # root) and try to mkdir state dirs there, failing with
        # permission-denied. Override HOME to a writable path inside
        # the container so aws's config dir lands at /tmp/.aws instead.
        - name: HOME
          value: /tmp
      # No envFrom: secretRef — AWS credentials reach the pod via IRSA.
      # The EKS pod-identity webhook injects AWS_ROLE_ARN +
      # AWS_WEB_IDENTITY_TOKEN_FILE based on the ServiceAccount's
      # eks.amazonaws.com/role-arn annotation; aws-sdk-go-v2 picks them
      # up and exchanges the projected SA token for short-lived IAM
      # credentials. PRD 04 §"In-cluster identity".
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"

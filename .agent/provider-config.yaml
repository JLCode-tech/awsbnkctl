# Provider Configuration
#
# Specifies which LLM provider and models to use for this project.
# Read by maf-init.sh at deploy time and maf-worktree.sh at setup time.
#
# Config precedence (highest to lowest):
#   1. CLI flags (--provider, --model-tier, --api-key-env)
#   2. This file (.agent/provider-config.yaml)
#   3. Framework defaults (.opencode/models.env)
#
# Usage:
#   1. Uncomment and edit the fields below for your provider.
#   2. Re-run: bin/maf-init.sh <target>   (or add --force to overwrite existing values)
#
# For full documentation see: DEPLOY.md § Provider Configuration
#
# While all fields are commented out, this file is a no-op and maf-init.sh
# falls back to framework defaults — no install-state.yaml will be written.

# --- Provider ---
# Provider identifier. Must match a provider block in opencode.json.
# Examples: anthropic, openai, azure-openai
# provider: anthropic

# --- API Key ---
# Name of the environment variable that holds the API key for this provider.
# The variable must be set in your shell before running maf-init.sh.
# api_key_env: LLM_API_KEY

# --- Base URL (optional) ---
# Required only for self-hosted or proxied endpoints.
# Leave empty or omit for standard cloud providers.
# base_url: ""

# --- Model Overrides (optional) ---
# Maps framework tiers to provider-specific model IDs.
# Format: <provider>/<model-id>  (provider prefix must match opencode.json)
# Valid tier keys: frontier, workhorse, fast, compaction
# Remove or comment out any tier to keep the framework default.
#
# model_overrides:
#   frontier:   anthropic/claude-opus-4-7
#   workhorse:  anthropic/claude-sonnet-4-6
#   fast:       anthropic/claude-haiku-4-5
#   compaction: anthropic/claude-haiku-4-5

# Model Configuration — Role-to-Tier Mapping
#
# Framework-agnostic. Defines WHICH TIER each role uses, not which specific model.
# Actual model IDs are set per-tool (see .opencode/models.env for OpenCode).
#
# Tiers describe capability requirements, not specific products:
#   frontier  — Deep reasoning, sustained focus. Errors cascade. (Lead, Architect)
#   workhorse — Pattern recognition, steerability, quality checking. (Reviewer)
#   fast      — Speed over depth. High volume, good-enough quality. (Builder)

roles:
  lead:
    tier: frontier
    description: "Orchestrator — decisions cascade downstream"
  architect:
    tier: frontier
    description: "Decomposition validation — errors cascade"
  builder:
    tier: fast
    description: "High-volume coding — speed matters most"
  reviewer:
    tier: workhorse
    description: "Code review — must be different tier than builder"

# Escalation chain for builder retry strategy.
# When builder fails repeatedly, upgrade through this chain:
#   Retry 1-2: same tier (fast) with reviewer feedback
#   Retry 3:   upgrade to workhorse-tier model
#   Beyond 3:  escalate to lead
escalation:
  - fast
  - workhorse
  - escalate

# Constraints enforced by bin/maf-models.sh validate
constraints:
  - "reviewer.tier != builder.tier"

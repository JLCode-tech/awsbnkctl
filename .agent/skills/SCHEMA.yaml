# agentskills.io frontmatter schema (locally vendored)
# Version anchor: see .agent/skills/SPEC_VERSION
# Upstream: https://agentskills.io/specification
#
# Each field has: required (bool), type (string), description.
# TODO: wire schema validation into CI (.github/workflows/) once stable.

required:
  - name
  - description

allowed:
  - name
  - description
  - user-only-trigger
  - disable-model-invocation
  - tags
  - version
  - homepage

types:
  name: string
  description: string
  user-only-trigger: boolean
  disable-model-invocation: boolean
  tags: list
  version: string
  homepage: string

# MAF convention overlay on top of the upstream spec:
maf_conventions:
  description_trigger_phrases:
    - "Use when"
    - "Use this skill when"
    - "ALWAYS invoke when"
    - "Use this"
  max_lines: 200

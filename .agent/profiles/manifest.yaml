version: 1
default_profile: build
profiles:
  build:
    description: Baseline balanced delivery profile
    overlays:
      labels: .agent/profiles/build/labels.yaml
  quick:
    description: Speed-optimized profile with lighter guidance overlays
    overlays:
      labels: .agent/profiles/quick/labels.yaml
      routing: .agent/profiles/quick/routing.md
      lead_guidance: .agent/profiles/quick/overlays/lead-guidance.md
      reviewer_lite_guidance: .agent/profiles/quick/overlays/reviewer-lite-guidance.md
      builder_guidance: .agent/profiles/quick/overlays/builder-guidance.md
  hardening:
    description: Reliability/security-depth profile guidance overlays
    overlays:
      labels: .agent/profiles/hardening/labels.yaml
      routing: .agent/profiles/hardening/routing.md
      lead_guidance: .agent/profiles/hardening/overlays/lead-guidance.md
      architect_guidance: .agent/profiles/hardening/overlays/architect-guidance.md
      reviewer_guidance: .agent/profiles/hardening/overlays/reviewer-guidance.md
materialization:
  selected_profile_targets:
    labels: .agent/profile/labels.yaml
    routing: .agent/profile/routing.md
